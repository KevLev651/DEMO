<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 383 192" fill="none" role="img" aria-labelledby="ctitle">
  <title id="ctitle">P&amp;ID Comparison Checker – PDF vs Excel tag list</title>
  <defs>
    <linearGradient id="pidBg" x1="0" y1="0" x2="175" y2="192" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0c1a2e"/>
      <stop offset="1" stop-color="#091524"/>
    </linearGradient>
    <linearGradient id="midBg" x1="175" y1="0" x2="208" y2="192" gradientUnits="userSpaceOnUse">
      <stop stop-color="#060f1c"/>
      <stop offset="1" stop-color="#060f1c"/>
    </linearGradient>
    <filter id="dropshadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#00000060"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="leftClip">
      <rect width="175" height="192"/>
    </clipPath>
    <clipPath id="rightClip">
      <rect x="208" width="175" height="192"/>
    </clipPath>
  </defs>

  <!-- ═══════════════════════════════════════════ -->
  <!-- BACKGROUND                                  -->
  <!-- ═══════════════════════════════════════════ -->
  <rect width="383" height="192" fill="#060f1c"/>

  <!-- Left panel -->
  <rect width="175" height="192" fill="url(#pidBg)"/>

  <!-- Subtle grid -->
  <g clip-path="url(#leftClip)" opacity=".08" stroke="#3a7ab0" stroke-width=".5">
    <path d="M0 24h175M0 48h175M0 72h175M0 96h175M0 120h175M0 144h175M0 168h175"/>
    <path d="M25 0v192M50 0v192M75 0v192M100 0v192M125 0v192M150 0v192"/>
  </g>

  <!-- Right panel -->
  <rect x="208" width="175" height="192" fill="#f2f6fb"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- P&ID PDF PANEL (left)                       -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Top header bar -->
  <rect x="0" y="0" width="175" height="18" fill="#0a1e38"/>
  <rect x="6" y="4" width="46" height="10" rx="2" fill="#c0392b"/>
  <text x="10" y="11.5" fill="#fff" font-family="Arial,sans-serif" font-size="6.2" font-weight="900">P&amp;ID PDF</text>
  <text x="58" y="11.5" fill="#4a7ca0" font-family="Arial,sans-serif" font-size="5" font-weight="700">PID-301  REV C</text>

  <!-- ── PROCESS PIPING ── -->
  <!-- Main horizontal header pipe -->
  <path d="M14 96 H165" stroke="#3a8fd4" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Left vertical riser -->
  <path d="M28 96 V60" stroke="#3a8fd4" stroke-width="2" stroke-linecap="round"/>

  <!-- Mid vertical drop -->
  <path d="M88 96 V130" stroke="#3a8fd4" stroke-width="2" stroke-linecap="round"/>

  <!-- Right vertical riser -->
  <path d="M140 96 V62" stroke="#3a8fd4" stroke-width="2" stroke-linecap="round"/>

  <!-- Branch to vessel 2 -->
  <path d="M152 96 V130" stroke="#3a8fd4" stroke-width="1.8" stroke-linecap="round"/>

  <!-- ── PUMP (left) ── -->
  <circle cx="20" cy="96" r="10" fill="#0d2540" stroke="#3a8fd4" stroke-width="1.8" filter="url(#dropshadow)"/>
  <!-- Pump triangle impeller -->
  <path d="M13.5 103 L13.5 89 L26 96 Z" fill="#3a8fd4" opacity=".9"/>

  <!-- ── VESSEL / COLUMN (mid-left) ── -->
  <rect x="56" y="54" width="24" height="32" rx="2.5" fill="#0d2540" stroke="#3a8fd4" stroke-width="1.6" filter="url(#dropshadow)"/>
  <!-- Vessel dished head top -->
  <path d="M56 62 Q68 56 80 62" fill="none" stroke="#3a8fd4" stroke-width="1.4"/>
  <!-- Vessel dished head bottom -->
  <path d="M56 78 Q68 84 80 78" fill="none" stroke="#3a8fd4" stroke-width="1.4"/>

  <!-- ── CONTROL VALVE (globe, bowtie) ── -->
  <path d="M82 96 L90 90 L90 102 L82 96 Z" fill="#3a8fd4"/>
  <path d="M96 96 L88 90 L88 102 L96 96 Z" fill="#3a8fd4"/>
  <!-- actuator stem -->
  <path d="M89 90 V82" stroke="#3a8fd4" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="85" y="78" width="8" height="4" rx="1" fill="#3a8fd4"/>

  <!-- ── VESSEL 2 (right) ── -->
  <rect x="129" y="54" width="22" height="28" rx="2.5" fill="#0d2540" stroke="#3a8fd4" stroke-width="1.6" filter="url(#dropshadow)"/>
  <path d="M129 61 Q140 55.5 151 61" fill="none" stroke="#3a8fd4" stroke-width="1.4"/>

  <!-- ── INSTRUMENT BUBBLES ── -->
  <!-- FT-101  flow transmitter -->
  <circle cx="28" cy="48" r="9.5" fill="#0d253f" stroke="#e8c44a" stroke-width="1.8" filter="url(#dropshadow)"/>
  <text x="28" y="46.5" fill="#ffd740" font-family="Arial,sans-serif" font-size="3.8" font-weight="900" text-anchor="middle">FT</text>
  <text x="28" y="52"   fill="#ffd740" font-family="Arial,sans-serif" font-size="3.8" font-weight="900" text-anchor="middle">101</text>
  <path d="M28 57.5 V66" stroke="#e8c44a" stroke-width=".9" stroke-dasharray="2,1.2"/>

  <!-- LT-202  level transmitter -->
  <circle cx="68" cy="88" r="9.5" fill="#0d253f" stroke="#e8c44a" stroke-width="1.8" filter="url(#dropshadow)"/>
  <text x="68" y="86.5" fill="#ffd740" font-family="Arial,sans-serif" font-size="3.8" font-weight="900" text-anchor="middle">LT</text>
  <text x="68" y="92"   fill="#ffd740" font-family="Arial,sans-serif" font-size="3.8" font-weight="900" text-anchor="middle">202</text>
  <path d="M68 78.5 V66" stroke="#e8c44a" stroke-width=".9" stroke-dasharray="2,1.2"/>

  <!-- FIC-301 flow indicator controller (panel mount – line through bubble) -->
  <circle cx="88" cy="140" r="9.5" fill="#122034" stroke="#e8c44a" stroke-width="1.8" filter="url(#dropshadow)"/>
  <line x1="78.5" y1="140" x2="97.5" y2="140" stroke="#e8c44a" stroke-width=".9"/>
  <text x="88" y="138.5" fill="#ffd740" font-family="Arial,sans-serif" font-size="3.4" font-weight="900" text-anchor="middle">FIC</text>
  <text x="88" y="144"   fill="#ffd740" font-family="Arial,sans-serif" font-size="3.4" font-weight="900" text-anchor="middle">301</text>
  <path d="M88 130.5 V109" stroke="#e8c44a" stroke-width=".9" stroke-dasharray="2,1.2"/>

  <!-- PIT-401 pressure transmitter -->
  <circle cx="140" cy="50" r="9.5" fill="#0d253f" stroke="#e8c44a" stroke-width="1.8" filter="url(#dropshadow)"/>
  <text x="140" y="48.5" fill="#ffd740" font-family="Arial,sans-serif" font-size="3.8" font-weight="900" text-anchor="middle">PIT</text>
  <text x="140" y="54"   fill="#ffd740" font-family="Arial,sans-serif" font-size="3.8" font-weight="900" text-anchor="middle">401</text>
  <path d="M140 59.5 V70" stroke="#e8c44a" stroke-width=".9" stroke-dasharray="2,1.2"/>

  <!-- TT-501 temperature transmitter -->
  <circle cx="152" cy="140" r="9.5" fill="#0d253f" stroke="#e8c44a" stroke-width="1.8" filter="url(#dropshadow)"/>
  <text x="152" y="138.5" fill="#ffd740" font-family="Arial,sans-serif" font-size="3.8" font-weight="900" text-anchor="middle">TT</text>
  <text x="152" y="144"   fill="#ffd740" font-family="Arial,sans-serif" font-size="3.8" font-weight="900" text-anchor="middle">501</text>
  <path d="M152 130.5 V109" stroke="#e8c44a" stroke-width=".9" stroke-dasharray="2,1.2"/>

  <!-- ── TITLE BLOCK ── -->
  <rect x="6" y="162" width="163" height="24" rx="2" fill="#0a1e38" stroke="#1a3a5c" stroke-width=".7"/>
  <g font-family="Arial,sans-serif">
    <text x="12" y="172" fill="#4a7ca0" font-size="3.8" font-weight="700">DRAWING</text>
    <text x="42" y="172" fill="#90caf9" font-size="4"   font-weight="800">PID-301-C</text>
    <text x="98" y="172" fill="#4a7ca0" font-size="3.8" font-weight="700">AREA</text>
    <text x="118" y="172" fill="#90caf9" font-size="4"  font-weight="800">PROCESS-3</text>
    <text x="12" y="181" fill="#4a7ca0" font-size="3.8" font-weight="700">SCALE</text>
    <text x="42" y="181" fill="#90caf9" font-size="4"   font-weight="800">1:50</text>
    <text x="98" y="181" fill="#4a7ca0" font-size="3.8" font-weight="700">REV</text>
    <text x="118" y="181" fill="#90caf9" font-size="4"  font-weight="800">C</text>
  </g>

  <!-- ═══════════════════════════════════════════ -->
  <!-- MIDDLE ARROW                                -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="175" y="78" width="33" height="36" rx="5" fill="#0a1e34"/>
  <!-- Arrow shaft + head -->
  <path d="M180 96 H201" stroke="#13d3e8" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M195 89 L204 96 L195 103" stroke="#13d3e8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
  <text x="191.5" y="107" fill="#13d3e8" font-family="Arial,sans-serif" font-size="3.8" font-weight="900" text-anchor="middle">COMPARE</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- EXCEL TAG LIST PANEL (right)                -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Window chrome bar -->
  <rect x="208" y="0" width="175" height="9" fill="#166534"/>
  <circle cx="214.5" cy="4.5" r="2.2" fill="#f87171" opacity=".9"/>
  <circle cx="221"   cy="4.5" r="2.2" fill="#fbbf24" opacity=".9"/>
  <circle cx="227.5" cy="4.5" r="2.2" fill="#4ade80" opacity=".9"/>
  <text x="295.5" y="6.5" fill="#86efac" font-family="Arial,sans-serif" font-size="3.3" font-weight="700" text-anchor="middle">PID_TAG_LIST_PID301.xlsx</text>

  <!-- Title header row -->
  <rect x="208" y="9" width="175" height="14" fill="#15803d"/>
  <text x="214" y="19" fill="#ffffff" font-family="Arial,sans-serif" font-size="6" font-weight="900">P&amp;ID TAG LIST  (Excel)</text>

  <!-- Column header row -->
  <rect x="208" y="23" width="175" height="11" fill="#166534"/>
  <g font-family="Arial,sans-serif" font-size="4" font-weight="900" fill="#6effc2">
    <text x="213" y="30.5">TAG</text>
    <text x="242" y="30.5">TYPE</text>
    <text x="272" y="30.5">DESCRIPTION</text>
    <text x="363" y="30.5" text-anchor="end">LOOP</text>
  </g>

  <!-- Column dividers -->
  <g stroke="#0d4f28" stroke-width=".6">
    <path d="M238 23 v169M268 23 v169M354 23 v169"/>
  </g>

  <!-- ── DATA ROWS ── -->
  <!-- Row 1 MATCH -->
  <rect x="208" y="34"  width="175" height="12" fill="#ecfdf5"/>
  <rect x="208" y="34"  width="4"   height="12" fill="#22c55e"/>
  <g font-family="Arial,sans-serif" font-size="4.4" font-weight="700" fill="#1a3320">
    <text x="213" y="42">FT-101</text>
    <text x="242" y="42">Flow</text>
    <text x="272" y="42">Flow Transmitter</text>
    <circle cx="358" cy="40" r="3" fill="#16a34a"/>
    <text x="364" y="42" fill="#166534" font-size="4">301</text>
  </g>

  <!-- Row 2 MATCH -->
  <rect x="208" y="46"  width="175" height="12" fill="#f0fdf4"/>
  <rect x="208" y="46"  width="4"   height="12" fill="#22c55e"/>
  <g font-family="Arial,sans-serif" font-size="4.4" font-weight="700" fill="#1a3320">
    <text x="213" y="54">LT-202</text>
    <text x="242" y="54">Level</text>
    <text x="272" y="54">Level Transmitter</text>
    <circle cx="358" cy="52" r="3" fill="#16a34a"/>
    <text x="364" y="54" fill="#166534" font-size="4">301</text>
  </g>

  <!-- Row 3 MATCH -->
  <rect x="208" y="58"  width="175" height="12" fill="#ecfdf5"/>
  <rect x="208" y="58"  width="4"   height="12" fill="#22c55e"/>
  <g font-family="Arial,sans-serif" font-size="4.4" font-weight="700" fill="#1a3320">
    <text x="213" y="66">FIC-301</text>
    <text x="242" y="66">Flow</text>
    <text x="272" y="66">Flow Ind. Controller</text>
    <circle cx="358" cy="64" r="3" fill="#16a34a"/>
    <text x="364" y="66" fill="#166534" font-size="4">301</text>
  </g>

  <!-- Row 4 MATCH -->
  <rect x="208" y="70"  width="175" height="12" fill="#f0fdf4"/>
  <rect x="208" y="70"  width="4"   height="12" fill="#22c55e"/>
  <g font-family="Arial,sans-serif" font-size="4.4" font-weight="700" fill="#1a3320">
    <text x="213" y="78">PIT-401</text>
    <text x="242" y="78">Pressure</text>
    <text x="272" y="78">Pressure Transmitter</text>
    <circle cx="358" cy="76" r="3" fill="#16a34a"/>
    <text x="364" y="78" fill="#166534" font-size="4">301</text>
  </g>

  <!-- Row 5 MATCH -->
  <rect x="208" y="82"  width="175" height="12" fill="#ecfdf5"/>
  <rect x="208" y="82"  width="4"   height="12" fill="#22c55e"/>
  <g font-family="Arial,sans-serif" font-size="4.4" font-weight="700" fill="#1a3320">
    <text x="213" y="90">TT-501</text>
    <text x="242" y="90">Temp</text>
    <text x="272" y="90">Temp Transmitter</text>
    <circle cx="358" cy="88" r="3" fill="#16a34a"/>
    <text x="364" y="90" fill="#166534" font-size="4">301</text>
  </g>

  <!-- Row 6 MISSING (red) -->
  <rect x="208" y="94"  width="175" height="12" fill="#fff1f2"/>
  <rect x="208" y="94"  width="4"   height="12" fill="#ef4444"/>
  <g font-family="Arial,sans-serif" font-size="4.4" font-weight="700">
    <text x="213" y="102" fill="#7f1d1d">AIT-612</text>
    <text x="242" y="102" fill="#7f1d1d">Analysis</text>
    <text x="272" y="102" fill="#b91c1c">NOT ON PDF</text>
    <circle cx="358" cy="100" r="3" fill="#dc2626"/>
  </g>

  <!-- Row 7 EXTRA on PDF (amber) -->
  <rect x="208" y="106" width="175" height="12" fill="#fffbeb"/>
  <rect x="208" y="106" width="4"   height="12" fill="#f59e0b"/>
  <g font-family="Arial,sans-serif" font-size="4.4" font-weight="700">
    <text x="213" y="114" fill="#78350f">CV-702</text>
    <text x="242" y="114" fill="#78350f">Valve</text>
    <text x="272" y="114" fill="#92400e">PDF ONLY</text>
    <circle cx="358" cy="112" r="3" fill="#f59e0b"/>
  </g>

  <!-- Row 8 MATCH -->
  <rect x="208" y="118" width="175" height="12" fill="#ecfdf5"/>
  <rect x="208" y="118" width="4"   height="12" fill="#22c55e"/>
  <g font-family="Arial,sans-serif" font-size="4.4" font-weight="700" fill="#1a3320">
    <text x="213" y="126">FV-803</text>
    <text x="242" y="126">Valve</text>
    <text x="272" y="126">Flow Control Valve</text>
    <circle cx="358" cy="124" r="3" fill="#16a34a"/>
    <text x="364" y="126" fill="#166534" font-size="4">301</text>
  </g>

  <!-- Row 9 faded placeholder -->
  <rect x="208" y="130" width="175" height="12" fill="#f0fdf4" opacity=".5"/>
  <rect x="208" y="130" width="4"   height="12" fill="#86efac"/>
  <g font-family="Arial,sans-serif" font-size="4.4" font-weight="700" fill="#3d6e50" opacity=".5">
    <text x="213" y="138">PT-901</text>
    <text x="242" y="138">Pressure</text>
    <text x="272" y="138">Pressure Indicator</text>
  </g>

  <!-- Legend / Key strip -->
  <rect x="208" y="142" width="175" height="11" fill="#e8f5ec"/>
  <g font-family="Arial,sans-serif" font-size="3.6" font-weight="800">
    <rect x="213" y="145" width="4" height="5" rx="1" fill="#22c55e"/>
    <text x="219" y="150.5" fill="#166534">MATCH</text>
    <rect x="247" y="145" width="4" height="5" rx="1" fill="#ef4444"/>
    <text x="253" y="150.5" fill="#991b1b">MISSING</text>
    <rect x="291" y="145" width="4" height="5" rx="1" fill="#f59e0b"/>
    <text x="297" y="150.5" fill="#92400e">PDF ONLY</text>
  </g>

  <!-- Summary footer -->
  <rect x="208" y="153" width="175" height="39" fill="#14532d"/>
  <text x="214" y="163" fill="#86efac" font-family="Arial,sans-serif" font-size="4.8" font-weight="900">COMPARISON SUMMARY</text>

  <rect x="213" y="166" width="48" height="14" rx="2.5" fill="#16a34a"/>
  <text x="217" y="172.5" fill="#fff" font-family="Arial,sans-serif" font-size="4.2" font-weight="900">MATCHED</text>
  <text x="225" y="178" fill="#bbf7d0" font-family="Arial,sans-serif" font-size="5.5" font-weight="900" text-anchor="middle">6 / 8</text>

  <rect x="267" y="166" width="48" height="14" rx="2.5" fill="#dc2626"/>
  <text x="271" y="172.5" fill="#fff" font-family="Arial,sans-serif" font-size="4.2" font-weight="900">MISSING</text>
  <text x="291" y="178" fill="#fecaca" font-family="Arial,sans-serif" font-size="5.5" font-weight="900" text-anchor="middle">1</text>

  <rect x="321" y="166" width="55" height="14" rx="2.5" fill="#d97706"/>
  <text x="325" y="172.5" fill="#fff" font-family="Arial,sans-serif" font-size="4.2" font-weight="900">PDF ONLY</text>
  <text x="348.5" y="178" fill="#fef3c7" font-family="Arial,sans-serif" font-size="5.5" font-weight="900" text-anchor="middle">1</text>
</svg>
