<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 746 503" role="img" aria-labelledby="title desc">
  <title id="title">IFB GMP PDF Compare preview</title>
  <desc id="desc">IFB and GMP drawing comparison preview with added, changed, and removed markups and the three public outputs.</desc>
  <defs>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .ink { stroke: #252d34; stroke-width: 1; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .faint { stroke: #9ba7b3; stroke-width: .8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke: #d8e0e7; stroke-width: 1; fill: none; }
      .blue { fill: #1d5f9e; }
      .copy { fill: #2d343c; font-size: 15px; font-weight: 700; }
      .small { fill: #333b44; font-size: 12px; font-weight: 600; }
      .note { fill: #2d343c; font-size: 13px; font-weight: 500; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1d6aa8"/>
    </marker>
    <g id="planA">
      <rect x="8" y="7" width="122" height="96" fill="#fafafa" stroke="#c7d0d8"/>
      <path class="thin" d="M18 20H120M18 41H120M18 62H120M18 83H120M34 13V98M61 13V98M91 13V98"/>
      <path class="ink" d="M28 27h37v21h23v-12h24v43H88v-14H55v28H28z"/>
      <path class="ink" d="M73 25v54M28 54h43M40 36h13M40 44h13M94 47h11M94 56h11"/>
      <path class="faint" d="M20 92h42M82 91h36M111 18v17M19 16h40"/>
      <circle cx="79" cy="59" r="6" fill="#fff" stroke="#252d34"/>
      <path class="ink" d="M79 53v12M73 59h12"/>
      <text x="88" y="31" class="font" font-size="6" fill="#56616c">IDF-1A</text>
      <text x="21" y="105" class="font" font-size="5.5" fill="#6c7680">TAC-001</text>
    </g>
    <g id="planB">
      <use href="#planA"/>
      <path d="M88 28c14-12 42-5 40 12 15-4 25 8 20 20 13 6 9 25-6 25H91c-17 0-27-18-17-31-8-12 0-25 14-26z" fill="none" stroke="#54a85f" stroke-width="2.4"/>
      <text x="98" y="49" class="font" font-size="7" fill="#2e7e36" font-weight="700">CAM-14</text>
    </g>
    <g id="planC">
      <use href="#planA"/>
      <path d="M85 49c10-10 30-7 32 5 13-2 21 7 17 17 10 5 6 20-6 20H85c-15 0-22-15-13-25-6-9 2-17 13-17z" fill="none" stroke="#f6a21a" stroke-width="2.2"/>
      <text x="100" y="72" class="font" font-size="7" fill="#c97a00" font-weight="700">SWITCH</text>
    </g>
    <g id="planD">
      <use href="#planA"/>
      <path d="M39 58c12-12 36-10 40 5 13-3 25 7 21 22 11 6 4 22-9 22H38c-16 0-27-17-16-30-8-11 2-21 17-19z" fill="none" stroke="#db2e2e" stroke-width="2.4"/>
    </g>
  </defs>

  <rect width="746" height="503" fill="#fff"/>

  <rect x="1" y="1" width="437" height="458" rx="7" fill="#fff" stroke="#d7e1ea"/>
  <text x="91" y="22" class="font" fill="#222b35" font-size="18" font-weight="800">IFB (OLDER)</text>
  <text x="275" y="22" class="font" fill="#222b35" font-size="18" font-weight="800">GMP (NEWER)</text>

  <rect x="8" y="29" width="202" height="121" fill="#fff" stroke="#2e9d4a" stroke-width="2"/>
  <rect x="222" y="29" width="202" height="121" fill="#fff" stroke="#2e9d4a" stroke-width="2"/>
  <rect x="8" y="169" width="202" height="121" fill="#fff" stroke="#f0a51b" stroke-width="2"/>
  <rect x="222" y="169" width="202" height="121" fill="#fff" stroke="#f0a51b" stroke-width="2"/>
  <rect x="8" y="309" width="202" height="121" fill="#fff" stroke="#e22d2d" stroke-width="2"/>
  <rect x="222" y="309" width="202" height="121" fill="#fff" stroke="#e22d2d" stroke-width="2"/>

  <g transform="translate(38 39)"><use href="#planA"/></g>
  <g transform="translate(252 39)"><use href="#planB"/></g>
  <g transform="translate(38 179)"><use href="#planA"/></g>
  <g transform="translate(252 179)"><use href="#planC"/></g>
  <g transform="translate(38 319)"><use href="#planD"/></g>
  <g transform="translate(252 319)"><use href="#planA"/></g>

  <rect x="17" y="446" width="21" height="14" fill="#fff" stroke="#2e9d4a" stroke-width="2"/>
  <text x="48" y="459" class="font small">ADDED</text>
  <rect x="114" y="446" width="21" height="14" fill="#fff" stroke="#f0a51b" stroke-width="2"/>
  <text x="145" y="459" class="font small">CHANGED</text>
  <rect x="236" y="446" width="21" height="14" fill="#fff" stroke="#e22d2d" stroke-width="2"/>
  <text x="267" y="459" class="font small">REMOVED</text>

  <line x1="442" y1="119" x2="475" y2="119" stroke="#1d6aa8" stroke-width="2.4" marker-end="url(#arrow)"/>
  <line x1="442" y1="263" x2="475" y2="263" stroke="#1d6aa8" stroke-width="2.4" marker-end="url(#arrow)"/>
  <line x1="442" y1="409" x2="475" y2="409" stroke="#1d6aa8" stroke-width="2.4" marker-end="url(#arrow)"/>

  <rect x="482" y="1" width="263" height="458" rx="7" fill="#fff" stroke="#d7e1ea"/>

  <g transform="translate(502 19)">
    <text x="0" y="14" class="font blue" font-size="18" font-weight="800">1. MARKED-UP REVIEW PDF</text>
    <g transform="translate(10 43)">
      <path d="M0 0h42l24 24v73H0z" fill="#fff" stroke="#ccd4dc"/>
      <path d="M42 0v24h24" fill="#eef2f5" stroke="#ccd4dc"/>
      <rect x="0" y="20" width="43" height="23" rx="2" fill="#e1202b"/>
      <text x="7" y="36" class="font" fill="#fff" font-size="16" font-weight="800">PDF</text>
      <path d="M26 76c8-13 13-31 10-44M19 83c16-3 35-16 43-28M15 61c11 4 24 1 34-4" fill="none" stroke="#d21f2b" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="100" y="48" class="font note">
      <tspan x="100" dy="0">Combined PDF with</tspan>
      <tspan x="100" dy="20">color markups,</tspan>
      <tspan x="100" dy="20">legends, and hyperlinks</tspan>
    </text>
  </g>

  <g transform="translate(502 169)">
    <text x="0" y="14" class="font blue" font-size="18" font-weight="800">2. EXCEL REPORT</text>
    <g transform="translate(12 43)">
      <path d="M0 0h42l24 24v73H0z" fill="#fff" stroke="#ccd4dc"/>
      <path d="M42 0v24h24" fill="#eef2f5" stroke="#ccd4dc"/>
      <path d="M23 29h43v51H23z" fill="#e9f2eb" stroke="#c8d6cb"/>
      <path d="M35 29v51M49 29v51M23 45h43M23 61h43" stroke="#c8d6cb" stroke-width="1"/>
      <rect x="-7" y="24" width="39" height="39" rx="3" fill="#21864a"/>
      <text x="4" y="51" class="font" fill="#fff" font-size="24" font-weight="800">X</text>
    </g>
    <text x="100" y="48" class="font note">
      <tspan x="100" dy="0">Summary and</tspan>
      <tspan x="100" dy="20">detailed changes</tspan>
      <tspan x="100" dy="20">by sheet and</tspan>
      <tspan x="100" dy="20">discipline</tspan>
    </text>
  </g>

  <g transform="translate(502 322)">
    <text x="0" y="14" class="font blue" font-size="18" font-weight="800">3. CHANGED-PAIRS ZIP PACKAGE</text>
    <g transform="translate(12 47)">
      <path d="M4 19h25l8 9h41c5 0 8 3 8 8v52H4z" fill="#f4bf3f" stroke="#b98a1e"/>
      <path d="M4 30h82l-8 58H0z" fill="#ffd354" stroke="#b98a1e"/>
      <path d="M32 25v61" stroke="#6f6f6f" stroke-width="2"/>
      <path d="M36 30h-8M36 39h-8M36 48h-8M36 57h-8M36 66h-8M36 75h-8" stroke="#fff" stroke-width="2"/>
    </g>
    <text x="100" y="52" class="font note">
      <tspan x="100" dy="0">Old vs New PDF</tspan>
      <tspan x="100" dy="20">pairs for all</tspan>
      <tspan x="100" dy="20">changed sheets</tspan>
    </text>
  </g>
</svg>
